---
- name: Install audio dependencies
  community.general.pacman:
    name:
      - pipewire
      - pipewire-pulse
      - pipewire-alsa
      - pipewire-jack
      - sof-firmware
      - alsa-utils
      - wireplumber
      - ffmpeg
      - pavucontrol
    state: present
    update_cache: yes
  become: true

- name: Install some audio plugins
  community.general.pacman:
    name:
      - gst-libav
      - gst-plugin-pipewire
      - gst-plugins-bad
    state: present
    update_cache: yes
  become: true

- name: Start Pipewire service
  ansible.builtin.systemd_service:
    name: pipewire
    state: started
    scope: user

- name: Start Wireplumber service
  ansible.builtin.systemd_service:
    name: wireplumber
    state: started
    scope: user
