---
- name: Install bluetooth dependencies
  community.general.pacman:
    name:
      - bluez
      - bluez-utils
    state: present
    update_cache: yes
  become: true

- name: Install AUR base packages
  kewlfft.aur.aur:
    name:
      - adw-bluetooth
  become: yes
  become_user: "{{ aur.user }}"

- name: Start bluetooth service
  ansible.builtin.systemd_service:
    name: bluetooth
    state: started
