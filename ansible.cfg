[defaults]
# Python interpreter
interpreter_python=/usr/bin/python3

# Inventory file location
inventory=./inventory.ini

# Don't create .retry files on failure
retry_files_enabled=False

# Disable host key checking for localhost (optional)
host_key_checking=False

# Show diffs when files change (helpful for debugging)
# diff_always=True

# Colored output
force_color=True

# Role path (if you want to add external roles later)
roles_path=./roles

collections_path=~/.local/share/ansible/collections
cache_dir=~/.cache/ansible
local_tmp=~/.cache/ansible/tmp
remote_tmp=~/.cache/ansible/tmp

[galaxy]
cache_dir=~/.cache/ansible/galaxy_cache

[privilege_escalation]
# Uncomment if you always want to be prompted for sudo password
# become_ask_pass=True
