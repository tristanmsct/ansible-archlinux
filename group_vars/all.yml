---
# User information
username: "{{ ansible_facts['user_id'] }}"
user_home: "/home/{{ username }}"
config_dir: "{{ user_home }}/.config"

# Common directories
scripts_dir: "{{ user_home }}/.local/bin"
backup_dir: "{{ user_home }}/backups"

# Git configuration
git_user_name: "Your Name"
git_user_email: "your.email@example.com"

# Python settings
python_version: "3.12"
python_packages:
  - pip
  - virtualenv
  - poetry
  - black
  - pylint

# Docker settings
docker_compose_version: "2.24.0"

# VSCodium extensions (example)
vscode_extensions:
  - ms-python.python
  - charliermarsh.ruff
  - golang.go

# Hyprland settings
hyprland_monitor_config:
  laptop: "eDP-1,1920x1080@60,0x0,1"
  external: "HDMI-A-1,2560x1440@144,1920x0,1"

# Theme preferences
gtk_theme: "Adwaita-dark"
icon_theme: "Papirus-Dark"
cursor_theme: "Adwaita"

# SSH settings
ssh_key_type: "ed25519"
