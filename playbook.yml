---
- name: Arch Linux Setup
  hosts: localhost
  gather_facts: true

  roles:
    - { role: base, tags: ['base'] }
    - { role: backup-tools, tags: ['backup-tools'] }
    - { role: cli-tools, tags: ['cli-tools'] }
    - { role: audio, tags: ['audio'] }
    - { role: bluetooth, tags: ['bluetooth'] }
    - { role: hyprland, tags: ['hyprland'] }
    - { role: cachyos, tags: ['cachyos'] }
    - { role: git, tags: ['git'] }
    - { role: bitwarden, tags: ['bitwarden'] }
    - { role: theming, tags: ['theming'] }
